        - blockquote [ref=e55]: “Pensaba que a mi edad y con mi trabajo ya no había nada que hacer. Hoy tengo más energía que hace diez años.”
        - paragraph [ref=e56]: Carlos · 48 · Director comercial
      - generic [ref=e58]:
        - generic [ref=e59]:
          - heading "El punto de partida" [level=2] [ref=e60]
          - paragraph [ref=e61]: "Carlos llegó a la valoración convencido de que “ya no tenía remedio”. A sus 48 años, con un puesto de director comercial y dos hijos adolescentes, llevaba más de una década sin pisar un gimnasio. Las cenas con clientes, los viajes y el estrés habían dejado huella: cansancio constante, mala calidad de sueño y una sensación de haber perdido el control de su propio cuerpo."
          - paragraph [ref=e62]: Lo que más le pesaba no era el número de la báscula, sino lo que sentía al mirarse al espejo y al subir las escaleras de casa sin aliento.
        - generic [ref=e63]:
          - heading "El plan" [level=2] [ref=e64]
          - paragraph [ref=e65]: "Diseñamos un programa realista: tres sesiones semanales, ninguna de más de 50 minutos, encajadas en su agenda antes de la jornada laboral. Nada de dietas imposibles —solo pautas claras y sostenibles que podía seguir incluso comiendo fuera de casa."
          - paragraph [ref=e66]: El foco de los primeros dos meses fue la técnica y la constancia. Antes de buscar intensidad, construimos una base sólida y un hábito que no dependiera de la motivación puntual.
        - generic [ref=e67]:
          - heading "La transformación" [level=2] [ref=e68]
          - paragraph [ref=e69]: A partir del tercer mes, los cambios se hicieron visibles. La ropa empezó a quedarle distinta, los compañeros de trabajo le preguntaban qué estaba haciendo y, sobre todo, recuperó energía para jugar al pádel con sus hijos los fines de semana.
          - paragraph [ref=e70]: "Siete meses después, Carlos no solo había perdido 14 kilos: había recuperado la confianza y una relación completamente nueva con el ejercicio."
      - generic [ref=e72]:
        - generic [ref=e73]:
