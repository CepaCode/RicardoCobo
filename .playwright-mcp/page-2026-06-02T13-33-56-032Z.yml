          - listitem [ref=e98]:
            - generic [ref=e99]: "02"
            - paragraph [ref=e100]: Un plan que encaja en tu agenda es un plan que se cumple. La logística importa tanto como el entrenamiento.
          - listitem [ref=e101]:
