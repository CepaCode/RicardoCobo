        - generic [ref=e59]:
          - heading "El punto de partida" [level=2] [ref=e60]
          - paragraph [ref=e61]: "María tenía 41 años y llevaba casi seis sin hacer ejercicio de forma regular. Abogada y madre de dos niños, había pasado de ser una persona muy activa a no encontrar nunca el momento. A las molestias de espalda se sumaba algo más difícil de admitir: había perdido la confianza en su propio cuerpo."
          - paragraph [ref=e62]: “No sé ni por dónde empezar” fue una de las primeras cosas que dijo en la valoración. Y precisamente por ahí empezamos.
        - generic [ref=e63]:
          - heading "El plan" [level=2] [ref=e64]
          - paragraph [ref=e65]: "El primer objetivo no fue estético, sino funcional: recuperar movilidad, fortalecer la zona media y eliminar el dolor de espalda que arrastraba desde hacía años. Trabajamos con cargas progresivas y mucho énfasis en la técnica."
          - paragraph [ref=e66]: Descartamos por completo las dietas restrictivas. En su caso, la clave era reconstruir una relación sana con el ejercicio y la comida, sin culpa y sin obsesión.
        - generic [ref=e67]:
          - heading "La transformación" [level=2] [ref=e68]
          - paragraph [ref=e69]: "En pocas semanas, el dolor de espalda desapareció. María empezó a notar fuerza en gestos cotidianos: cargar la compra, jugar con sus hijos, subir cuestas sin molestias. Esa sensación de capacidad fue el verdadero punto de inflexión."
          - paragraph [ref=e70]: Ocho meses después, entrena con seguridad, levanta cargas que jamás imaginó y, sobre todo, ha vuelto a disfrutar de moverse. El ejercicio dejó de ser una asignatura pendiente para convertirse en parte de su vida.
